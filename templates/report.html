<!DOCTYPE html>
<html>
<head>
    <title>Customer Reports | Smart Ration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/report.css') }}">
</head>
<body>

<div class="header">
    <h1>📢 Customer Problem Reports</h1>
    <a href="{{ url_for('home') }}" class="home-btn">Home</a>
</div>

<div class="report-container">
    {% for r in reports %}
    <div class="report-box">
        <h3>{{ r.title }}</h3>
        <p>{{ r.description }}</p>

        <div class="details">
            <span><b>Name:</b> {{ r.name }}</span>
            <span><b>Card No:</b> {{ r.card_number }}</span>
            <span><b>Date:</b> {{ r.created_at.strftime('%d-%m-%Y') }}</span>
            <span><b>Time:</b> {{ r.created_at.strftime('%I:%M %p') }}</span>
        </div>
    </div>
    {% endfor %}
</div>

<hr>

<h2 class="form-title">📝 Submit Your Complaint</h2>

<form method="POST" action="{{ url_for('save_report') }}" class="report-form">

    <input type="text" name="title" placeholder="Problem Title" required>

    <textarea name="description" placeholder="Describe your issue" required></textarea>

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="text" name="card_number" placeholder="Card Number" required>

    <button type="submit">Submit Report</button>

</form>

</body>
</html>
